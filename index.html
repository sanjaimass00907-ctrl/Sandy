<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  background:linear-gradient(135deg,#a18cd1,#fbc2eb);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.card{
  background:#fff;
  width:90%;
  max-width:360px;
  border-radius:20px;
  padding:25px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
  position:relative;
  z-index:2;
}

h1{
  color:#7b2cbf;
  margin-bottom:10px;
}

p{
  font-size:14px;
  color:#444;
}

button{
  margin-top:20px;
  padding:12px 22px;
  border:none;
  border-radius:30px;
  background:#7b2cbf;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#9d4edd;
}

#wishBox,#photoBox{
  display:none;
  margin-top:20px;
}

#wishText{
  font-size:15px;
  line-height:1.6;
}

/* SLIDESHOW */
.slideshow{
  position:relative;
  width:100%;
  height:260px;
  overflow:hidden;
  border-radius:15px;
  margin-top:15px;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:opacity 1s ease-in-out;
}

.slide.active{
  opacity:1;
}

/* PURPLE HEART SHOWER */
.heart{
  position:fixed;
  top:-10px;
  font-size:20px;
  animation:fall linear forwards;
  z-index:1;
}

@keyframes fall{
  to{
    transform:translateY(100vh);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="card">

  <!-- SCREEN 1 -->
  <div id="screen1">
    <h1>🎂 Happy Birthday 🎂</h1>
    <p><b>Bakki💜(Mutta🐣)</b></p> <!-- 👉 NAME CHANGE HERE -->
    <button onclick="startWish()">Tap Me 🎁</button>
  </div>

  <!-- SCREEN 2 -->
  <div id="wishBox">
    <p id="wishText"></p>
    <button onclick="showPhoto()">One More Surprise 📸</button>
  </div>

  <!-- SCREEN 3 -->
  <div id="photoBox">
    <h1>💜 For You Bakki 💜</h1>

    <div class="slideshow">
      <img class="slide active" src="photo1.jpg">
      <img class="slide" src="photo2.jpg">
      <img class="slide" src="photo3.jpg">
      <img class="slide" src="photo4.jpg">
    </div>

    <p style="margin-top:10px;">Forever memories 💫</p>
  </div>

</div>

<audio id="song">
  <source src="teddy_nanbiye.mp3" type="audio/mpeg">
</audio>

<script>
// TYPING MESSAGE
const message =
"En life-la nee irukradhu\n" +
"oru periya gift 💝\n\n" +
"Un smile 😄\n" +
"Un care 🤍\n" +
"Un friendship 💫\n" +
"ellamey romba special.\n\n" +
"Innum neraya birthdays\n" +
"naama serndhu celebrate pannanum 🎉\n\n" +
"Always happy-aa iru 💜";

let i = 0;

function startWish(){
  document.getElementById("screen1").style.display="none";
  document.getElementById("wishBox").style.display="block";
  typeText();
}

function typeText(){
  if(i < message.length){
    document.getElementById("wishText").innerHTML +=
      message.charAt(i)==="\n" ? "<br>" : message.charAt(i);
    i++;
    setTimeout(typeText,40);
  }
}

// SLIDESHOW
let slides = document.querySelectorAll(".slide");
let index = 0;

function startSlideshow(){
  setInterval(()=>{
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
  },3000);
}

function showPhoto(){
  document.getElementById("photoBox").style.display="block";
  document.getElementById("song").play();
  startSlideshow();
}

// PURPLE HEART SHOWER
function createHeart(){
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerText="💜";
  heart.style.left=Math.random()*100+"vw";
  heart.style.animationDuration=(2+Math.random()*3)+"s";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),5000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
